name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLE_TOKEN: ${{ secrets.PAGES_ENABLE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages with auto-enable
        if: ${{ env.PAGES_ENABLE_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_ENABLE_TOKEN }}
          enablement: true

      - name: Configure Pages
        if: ${{ env.PAGES_ENABLE_TOKEN == '' }}
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'README.md' \
            --exclude 'LICENSE' \
            ./ ./_site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
